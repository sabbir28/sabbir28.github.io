<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .error-container {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1rem;
            color: var(--text-main);
        }
    </style>
</head>

<body class="">
    <div class="bg-glow"></div>

    <nav>
        <a href="/" class="logo">SABBIR28</a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/about.html">About</a></li>
            <li><a href="/service.html">Services</a></li>
            <li><a href="/work.html">Work</a></li>
        </ul>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
                <i id="theme-icon" class="bi bi-sun-fill"></i>
            </button>
        </div>
    </nav>

    <main class="error-container" style="padding-top: var(--nav-height);">
        <div class="error-code gradient-text">404</div>
        <h2 style="font-size: 2rem; margin-bottom: 1rem;">Page Not Found</h2>
        <p style="color: var(--text-muted); font-size: 1.1rem; max-width: 500px; margin-bottom: 2rem;">
            The page you are looking for has been moved, deleted, or never existed in the first place.
        </p>
        <a href="/" class="btn-primary">Return Home</a>
    </main>

    <script src="assets/js/theme.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }
    </script>
</body>

</html>
